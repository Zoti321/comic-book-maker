name: frb_freezed_codegen
description: 独立工作区，为 FRB 生成的 @freezed 类型运行 build_runner。
publish_to: none

environment:
  sdk: ^3.10.4

dependencies:
  comic_book_maker:
    path: ../..
  freezed_annotation: ^3.0.0
  flutter_rust_bridge: 2.12.0

dev_dependencies:
  build_runner: 2.10.0
  freezed: ^3.0.0

dependency_overrides:
  analyzer: ^9.0.0
  dart_style: 3.1.3
  mockito: 5.6.1

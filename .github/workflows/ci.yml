name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.38.5"
  FRB_CODEGEN_VERSION: "2.12.0"

jobs:
  core:
    name: core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: flutter_rust_bridge_codegen
          tag: ${{ env.FRB_CODEGEN_VERSION }}

      - name: FRB codegen
        working-directory: app
        run: flutter_rust_bridge_codegen generate

      - name: cargo test
        run: cargo test --manifest-path core/Cargo.toml

  dart:
    name: dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Link rust_builder to core
        run: |
          rm -rf app/rust_builder/rust
          ln -s ../../core app/rust_builder/rust

      - uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: flutter_rust_bridge_codegen
          tag: ${{ env.FRB_CODEGEN_VERSION }}

      - name: FRB codegen
        working-directory: app
        run: flutter_rust_bridge_codegen generate

      - name: FRB freezed codegen
        run: bash app/tool/frb_freezed_codegen/run_codegen.sh

      - name: Riverpod codegen
        run: bash app/tool/riverpod_codegen/run_codegen.sh

      - name: flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Generate integration test fixture
        working-directory: app
        run: dart run tool/generate_integration_fixture.dart

      - name: Build native core library for tests
        run: cargo build --manifest-path core/Cargo.toml

      - name: flutter analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos

      - name: flutter test
        working-directory: app
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/core/target/debug
        run: flutter test

      - name: flutter integration test
        working-directory: app
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/core/target/debug
        run: flutter test integration_test/ -d flutter-tester

      - name: FRB UI isolation
        run: bash scripts/check-frb-ui-isolation.sh

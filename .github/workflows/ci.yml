name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.38.5"
  FRB_CODEGEN_VERSION: "2.12.0"

jobs:
  core:
    name: core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          link-rust-builder: "false"
          run-pub-get: "false"

      - name: cargo test
        run: cargo test --manifest-path core/Cargo.toml

  dart:
    name: dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-freezed-codegen: "true"
          run-riverpod-codegen: "true"

      - name: Generate integration test fixture
        working-directory: app
        run: dart run tool/generate_integration_fixture.dart

      - name: Build native core library for tests
        run: cargo build --manifest-path core/Cargo.toml

      - name: flutter analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos

      - name: flutter test
        working-directory: app
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/core/target/debug
        run: flutter test

      - name: flutter integration test
        working-directory: app
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/core/target/debug
        run: flutter test integration_test/ -d flutter-tester

      - name: FRB UI isolation
        run: bash scripts/check-frb-ui-isolation.sh

  android:
    name: android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-freezed-codegen: "true"
          run-riverpod-codegen: "true"

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: flutter build apk (arm64 smoke)
        working-directory: app
        run: flutter build apk --release --target-platform android-arm64

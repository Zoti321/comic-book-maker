name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without v prefix (e.g. 1.0.0)"
        required: true
        default: "0.0.0-ci"

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_id) || github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.38.5"
  FRB_CODEGEN_VERSION: "2.12.0"

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-freezed-codegen: "true"
          run-riverpod-codegen: "true"

      - name: cargo test
        run: cargo test --manifest-path core/Cargo.toml

      - name: flutter analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos

      - name: FRB UI isolation
        run: bash scripts/check-frb-ui-isolation.sh

  build-windows:
    name: build-windows
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-freezed-codegen: "true"
          run-riverpod-codegen: "true"

      - name: flutter build windows
        working-directory: app
        run: >
          flutter build windows --release
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.name }}"
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found after Inno Setup install"
          }
          & $iscc `
            "/DMyAppVersion=$version" `
            "/DOutputDir=$dist" `
            "app\windows\installer\comic_book_maker.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/comic-book-maker-*-windows-x64-setup.exe

  build-macos:
    name: build-macos
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-freezed-codegen: "true"
          run-riverpod-codegen: "true"

      - name: flutter build macos
        working-directory: app
        run: >
          flutter build macos --release
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Package macOS app
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          APP="app/build/macos/Build/Products/Release/comic_book_maker.app"
          DIST="dist/comic-book-maker-${VERSION}-macos-arm64.zip"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$DIST"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/comic-book-maker-*-macos-arm64.zip

  build-linux:
    name: build-linux
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-freezed-codegen: "true"
          run-riverpod-codegen: "true"

      - name: flutter build linux
        working-directory: app
        run: >
          flutter build linux --release
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Package Linux bundle
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          mkdir -p dist
          tar -czf "dist/comic-book-maker-${VERSION}-linux-x64.tar.gz" \
            -C app/build/linux/x64/release bundle

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/comic-book-maker-*-linux-x64.tar.gz

  build-android:
    name: build-android
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-freezed-codegen: "true"
          run-riverpod-codegen: "true"

      - name: Configure Android release signing
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/android/upload-keystore.jks
          cat > app/android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: flutter build apk
        working-directory: app
        run: >
          flutter build apk --release
          --target-platform android-arm64
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Package Android APK
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          mkdir -p dist
          cp app/build/app/outputs/flutter-apk/app-release.apk \
            "dist/comic-book-maker-${VERSION}-android-arm64.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/comic-book-maker-*-android-arm64.apk

  build-ios:
    name: build-ios
    needs: verify
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-freezed-codegen: "true"
          run-riverpod-codegen: "true"

      - name: flutter build ios
        working-directory: app
        run: >
          flutter build ios --release --no-codesign
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Package iOS app
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          APP="app/build/ios/iphoneos/Runner.app"
          DIST="dist/comic-book-maker-${VERSION}-ios-unsigned.zip"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$DIST"

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/comic-book-maker-*-ios-unsigned.zip

  release:
    name: release
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 移动端说明

            - **Android**（`*-android-arm64.apk`）：release 签名侧载包；首次安装需在系统设置中允许「未知来源」；应用内更新需使用同一签名密钥。
            - **iOS**（`*-ios-unsigned.zip`）：未签名 `.app` 归档，**不可在真机安装**；仅供归档或模拟器调试参考。

            ---
          files: dist/*

      - name: Manual build summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual release build completed."
          echo "Download platform artifacts from this workflow run (Artifacts tab)."
          echo "No GitHub Release was created."
